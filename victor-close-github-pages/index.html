<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Victor Close Countdown</title>
  <meta name="description" content="A countdown for Uzair and Nida moving into Victor Close." />
  <meta name="theme-color" content="#8d6e63" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Victor Close" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <style>
    :root {
      --cream: #fff8ee;
      --blush: #ffd6df;
      --rose: #b65a6a;
      --sage: #9cac8c;
      --ink: #3d2d2a;
      --glass: rgba(255, 248, 238, 0.72);
      --glass-strong: rgba(255, 248, 238, 0.88);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #f7d6c8, #fff7ed 48%, #dce7cf);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 248, 238, 0.18), rgba(255, 248, 238, 0.44)),
        url("assets/victor-close.jpeg") center / cover no-repeat;
      filter: saturate(1.08) brightness(1.03);
      transform: scale(1.03);
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 214, 223, 0.85), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(220, 231, 207, 0.85), transparent 30%),
        linear-gradient(to bottom, rgba(61, 45, 42, 0.15), rgba(255, 248, 238, 0.34));
      z-index: -2;
    }

    .petal {
      position: fixed;
      top: -12vh;
      font-size: clamp(18px, 4vw, 34px);
      opacity: 0.65;
      animation: fall linear infinite;
      z-index: -1;
      text-shadow: 0 8px 24px rgba(61, 45, 42, 0.18);
    }

    @keyframes fall {
      0% { transform: translate3d(0, -12vh, 0) rotate(0deg); }
      100% { transform: translate3d(var(--drift), 112vh, 0) rotate(360deg); }
    }

    main {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
    }

    .card {
      width: min(720px, 100%);
      padding: clamp(22px, 6vw, 46px);
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: 34px;
      background: var(--glass);
      box-shadow: 0 24px 80px rgba(61, 45, 42, 0.22), inset 0 1px 0 rgba(255,255,255,0.8);
      backdrop-filter: blur(18px) saturate(1.2);
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.52);
      color: #6e5047;
      font-weight: 750;
      letter-spacing: 0.02em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(44px, 13vw, 92px);
      line-height: 0.94;
      letter-spacing: -0.07em;
      color: #5a342f;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0 auto 26px;
      max-width: 560px;
      color: #624841;
      font-size: clamp(18px, 4.4vw, 25px);
      line-height: 1.35;
      font-weight: 650;
    }

    .date-pill {
      display: inline-block;
      margin-bottom: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--glass-strong);
      font-weight: 800;
      color: var(--rose);
      box-shadow: 0 10px 30px rgba(61, 45, 42, 0.08);
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(9px, 2.5vw, 16px);
      margin: 10px 0 26px;
    }

    .unit {
      min-height: 106px;
      display: grid;
      align-content: center;
      gap: 6px;
      padding: 15px 8px;
      border-radius: 24px;
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: 0 10px 30px rgba(61, 45, 42, 0.1);
    }

    .number {
      font-size: clamp(30px, 9vw, 58px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #6b3c36;
      font-variant-numeric: tabular-nums;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7b5c52;
      font-weight: 900;
    }

    .message {
      min-height: 54px;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 0 10px;
      color: #563c36;
      font-size: clamp(16px, 3.8vw, 20px);
      font-weight: 700;
      line-height: 1.45;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(61, 45, 42, 0.72);
      font-weight: 700;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .confetti span {
      position: absolute;
      top: -20px;
      animation: confetti 4.8s linear infinite;
      font-size: 22px;
    }

    @keyframes confetti {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 430px) {
      .card { border-radius: 28px; }
      .countdown { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .unit { min-height: 98px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-label="Victor Close moving countdown">
      <div class="eyebrow">🏡 New home countdown</div>
      <h1>Victor Close</h1>
      <p class="subtitle">Uzair &amp; Nida are moving into their beautiful new home.</p>
      <div class="date-pill">Friday 17 July 2026</div>

      <div class="countdown" aria-live="polite">
        <div class="unit"><div class="number" id="days">0</div><div class="label">Days</div></div>
        <div class="unit"><div class="number" id="hours">0</div><div class="label">Hours</div></div>
        <div class="unit"><div class="number" id="minutes">0</div><div class="label">Minutes</div></div>
        <div class="unit"><div class="number" id="seconds">0</div><div class="label">Seconds</div></div>
      </div>

      <p class="message" id="message">Every second closer to keys, memories and cosy nights in. ✨</p>
      <div class="footer">Made with love for Uzair &amp; Nida</div>
    </section>
  </main>

  <div class="confetti" id="confetti" hidden></div>

  <script>
    const target = new Date("2026-07-17T00:00:00+01:00");
    const ids = ["days", "hours", "minutes", "seconds"];
    const messages = [
      "Every second closer to keys, memories and cosy nights in. ✨",
      "A new chapter is nearly here. 🗝️",
      "Victor Close is getting ready for Uzair & Nida. 🤍",
      "Soon it will be home sweet home. 🏡"
    ];

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const distance = target - now;

      if (distance <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        document.getElementById("message").textContent = "Welcome home, Uzair & Nida! 🎉";
        launchConfetti();
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = pad(hours);
      document.getElementById("minutes").textContent = pad(minutes);
      document.getElementById("seconds").textContent = pad(seconds);

      const messageIndex = Math.floor(now.getSeconds() / 15) % messages.length;
      document.getElementById("message").textContent = messages[messageIndex];
    }

    function addPetals() {
      const symbols = ["🌸", "🌿", "✨", "🤍", "🌼"];
      for (let i = 0; i < 18; i++) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.textContent = symbols[i % symbols.length];
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.setProperty("--drift", (Math.random() * 90 - 45) + "px");
        petal.style.animationDuration = (9 + Math.random() * 10) + "s";
        petal.style.animationDelay = (-Math.random() * 14) + "s";
        document.body.appendChild(petal);
      }
    }

    function launchConfetti() {
      const confetti = document.getElementById("confetti");
      if (!confetti.hidden) return;
      confetti.hidden = false;
      const symbols = ["🎉", "💐", "🏡", "✨", "🤍", "🗝️"];
      for (let i = 0; i < 48; i++) {
        const piece = document.createElement("span");
        piece.textContent = symbols[i % symbols.length];
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.animationDelay = Math.random() * 3 + "s";
        piece.style.animationDuration = (3.2 + Math.random() * 3) + "s";
        confetti.appendChild(piece);
      }
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
    }

    addPetals();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
